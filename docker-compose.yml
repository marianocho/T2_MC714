  node3:
    build: .
    container_name: node3
    hostname: node3
    command: ["python", "run_node.py", "--id", "3", "--config", "config.docker.json", "--mode", "demo"]
    networks: [sdnet]

  node4:
    build: .
    container_name: node4
    hostname: node4
    command: ["python", "run_node.py", "--id", "4", "--config", "config.docker.json", "--mode", "demo"]
    networks: [sdnet]

networks:
  sdnet:
    driver: bridge
