services:
  node1:
    build: .
    container_name: node1
    hostname: node1
    command: ["python", "run_node.py", "--id", "1", "--config", "config.docker.json", "--mode", "demo"]
    networks: [sdnet]

  node2:
    build: .
    container_name: node2
    hostname: node2
    command: ["python", "run_node.py", "--id", "2", "--config", "config.docker.json", "--mode", "demo"]
